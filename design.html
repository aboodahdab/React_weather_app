<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(28px, -22px) scale(1.06);
        }
        66% {
          transform: translate(-18px, 18px) scale(0.94);
        }
      }
      .blob-1 {
        animation: drift 14s ease-in-out infinite;
      }
      .blob-2 {
        animation: drift 11s ease-in-out infinite;
        animation-delay: -4s;
      }
      .blob-3 {
        animation: drift 17s ease-in-out infinite;
        animation-delay: -9s;
      }

      .temp-gradient {
        background: linear-gradient(
          180deg,
          #ffffff 30%,
          rgba(255, 255, 255, 0.45)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#07071a] text-white overflow-x-hidden">
    <!-- Animated background -->
    <div class="fixed inset-0 overflow-hidden z-0">
      <div
        class="blob-1 absolute rounded-full blur-[90px] w-[560px] h-[560px] bg-[rgba(0,190,210,0.22)] -top-[140px] -left-[100px]"
      ></div>

      <div
        class="blob-2 absolute rounded-full blur-[90px] w-[480px] h-[480px] bg-[rgba(110,40,255,0.28)] -bottom-[80px] -right-[80px]"
      ></div>
      <div
        class="blob-3 absolute rounded-full blur-[90px] w-[380px] h-[380px] bg-[rgba(0,230,160,0.13)] top-[45%] left-[45%]"
      ></div>
    </div>

    <div
      class="relative z-10 min-h-screen flex flex-col items-center justify-center px-5 pt-[52px] pb-11"
    >
      <!-- Search -->
      <div class="w-full max-w-[580px] mb-14">
        <div
          class="flex items-center gap-3 bg-white/[0.06] border border-white/[0.11] rounded-full py-[7px] pl-[22px] pr-[7px] backdrop-blur-xl transition-colors focus-within:border-[rgba(0,210,190,0.45)]"
        >
          <span class="text-base opacity-50 shrink-0">🔍</span>
          <input
            type="text"
            placeholder="Search for a city..."
            class="flex-1 bg-transparent border-none outline-none text-[15px] text-white placeholder:text-white/30"
          />
          <button
            class="bg-gradient-to-br from-[#00c8b8] to-[#0080ff] rounded-full py-[11px] px-6 text-sm font-medium text-white shrink-0 hover:opacity-80 active:scale-95 transition-all cursor-pointer"
          >
            Search
          </button>
        </div>
      </div>

      <!-- Current Weather -->
      <div class="text-center mt-4 mb-14">
        <p class="text-[20px] font-medium text-white/90 mb-1">New York, US</p>
        <p class="text-[14px] text-white/30 mb-7">Wednesday · Jun 25 · 4:00 PM</p>

        <!-- Unit toggle -->
        <div
          class="inline-flex items-center bg-white/5 border border-white/[0.08] rounded-full p-1 mb-6"
        >
          <button
            class="px-4 py-1.5 rounded-full text-sm font-medium bg-gradient-to-br from-[#00c8b8] to-[#0080ff] text-white transition-all"
          >
            °F
          </button>
          <button
            class="px-4 py-1.5 rounded-full text-sm font-medium text-white/40 hover:text-white/70 transition-all"
          >
            °C
          </button>
        </div>

        <div class="flex items-center justify-center gap-3 mb-2">
          <span class="text-[72px] drop-shadow-[0_0_28px_rgba(0,210,190,0.3)]"
            >⛅</span
          >
          <span
            class="temp-gradient text-[140px] font-light leading-none tracking-[-6px]"
            >72°</span
          >
          <span
            class="self-start mt-6 text-xs font-medium text-white/40 bg-white/5 border border-white/[0.08] rounded-full px-2 py-0.5"
            >F</span
          >
        </div>

        <p class="text-[19px] text-[rgba(0,210,185,0.75)] mb-9">
          Partly Cloudy
        </p>

        <div class="flex items-center gap-10">
          <div class="flex flex-col items-center gap-1">
            <span class="text-xl font-medium">65%</span>
            <span class="text-sm text-white/30">💧 Humidity</span>
          </div>
          <div class="w-px h-10 bg-white/10"></div>
          <div class="flex flex-col items-center gap-1">
            <span class="text-xl font-medium">12 mph</span>
            <span class="text-sm text-white/30">💨 Wind</span>
          </div>
          <div class="w-px h-10 bg-white/10"></div>
          <div class="flex flex-col items-center gap-1">
            <span class="text-xl font-medium">70°F</span>
            <span class="text-sm text-white/30">🌡 Feels like</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
